name: CI / Release

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check Changesets (PR only)
        if: github.event_name == 'pull_request'
        run: npx changeset status

  release:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: release
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Auto-generate changeset from commits
        run: bash scripts/auto-changeset.sh
      - name: Apply version bumps
        run: npx changeset version
      - name: Commit and push version bumps
        run: |
          git add .
          git diff --staged --quiet && echo "No changesets to release" || \
            (git commit -m "chore: release [skip ci]" && git push)
      - name: Publish
        run: npx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM }}
